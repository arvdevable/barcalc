<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>song bar to seconds calculator</title>

    <meta name="description" content="song bar to seconds calculator">
    <meta name="keywords" content="song bar to seconds calculator">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <meta name="revisit-after" content="1 days">
    <meta name="theme-color" content="#0f1214">
    <meta name="description" content="song bar to seconds calculator">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zalando+Sans:ital,wdth,wght@0,75..125,200..900;1,75..125,200..900&display=swap');

    :root {
      --bg:         #0f1214;
      --surface:    #181c1f;
      --surface-2:  #1e2427;
      --border:     rgba(255,255,255,.07);
      --border-2:   rgba(255,255,255,.04);
      --accent:     #44A194;
      --accent-dim: rgba(68,161,148,.15);
      --muted:      #6a9ab8;
      --coral:      #EC8F8D;
      --ink:        #e8eaea;
      --ink-60:     rgba(232,234,234,.6);
      --ink-40:     rgba(232,234,234,.35);
      --ink-10:     rgba(255,255,255,.06);
      --radius:     14px;
      --maxw:       440px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Zalando Sans", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--maxw);
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 12px 48px rgba(0,0,0,.45);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-margin-top: 2rem;
    }

    header { display: flex; flex-direction: column; gap: .3rem; }

    h1.hero {
      font-variation-settings: "wdth" 115;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.05;
      font-size: 1.3rem;
      color: var(--ink);
    }

    p.lead {
      font-size: .8rem;
      color: var(--ink-60);
      line-height: 1.5;
    }

    form { display: flex; flex-direction: column; gap: .75rem; }
    .row { display: flex; gap: .5rem; }
    .field { display: flex; flex-direction: column; gap: .3rem; width: 100%; }

    label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--ink-40);
    }

    input[type="number"],
    select {
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      padding: .5rem .65rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      outline: none;
      color: var(--ink);
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: .3; }
    select option { background: var(--surface-2); }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .bars-range { display: flex; align-items: center; gap: .4rem; }
    .bars-col { flex: 1; }
    .bars-divider { font-size: .9rem; color: var(--ink-40); flex-shrink: 0; }

    .actions { display: flex; gap: .5rem; }

    button[type="submit"] {
      flex: 1;
      font-family: inherit;
      font-weight: 700;
      font-size: .92rem;
      padding: .6rem 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(160deg, var(--accent) 0%, #2d6b62 100%);
      color: #fff;
      cursor: pointer;
      transition: opacity .12s, transform .1s;
      box-shadow: 0 2px 12px rgba(68,161,148,.25);
    }
    button[type="submit"]:hover { opacity: .9; }
    button[type="submit"]:active { transform: translateY(1px); }

    .btn-share {
      font-family: inherit;
      font-weight: 600;
      font-size: .85rem;
      padding: .6rem .85rem;
      border-radius: 10px;
      border: 1.5px dashed rgba(106,154,184,.35);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn-share:hover {
      background: rgba(106,154,184,.08);
      border-color: var(--muted);
    }

    /* ── Result ── */
    .result {
      display: none;
      flex-direction: column;
      gap: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .result-beat-row {
      padding: .55rem 1rem;
      font-size: .72rem;
      color: var(--ink-40);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .result-beat-row span { color: var(--muted); font-weight: 600; }

    .result-block {
      padding: .9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .15rem;
      border-bottom: 1px solid var(--border-2);
    }
    .result-block:last-child { border-bottom: none; }
    .result-block:nth-child(even) { background: var(--surface); }
    .result-block:nth-child(odd)  { background: var(--surface-2); }

    .rb-title {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-40);
      margin-bottom: .15rem;
    }

    .rb-value {
      font-family: ui-monospace, "Roboto Mono", monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -.5px;
      line-height: 1.1;
    }
    .rb-value .unit {
      font-size: .8rem;
      font-weight: 500;
      color: var(--ink-60);
      margin-left: .2rem;
      letter-spacing: 0;
    }
    .rb-sub {
      font-size: .72rem;
      color: var(--ink-40);
      margin-top: .1rem;
    }

    .rb-value.accent { color: var(--accent); }
    .rb-value.coral  { color: var(--coral); }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .4rem;
      font-size: .72rem;
      color: var(--ink-40);
    }
    footer a { color: var(--muted); text-decoration: none; font-weight: 600; }
    footer a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 1.75rem;
      background: #e8eaea;
      color: #0f1214;
      padding: .45rem .9rem;
      border-radius: 99px;
      font-size: .8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; pointer-events: auto; }

    @media (max-width: 420px) {
      body { padding: 2rem 1rem 3rem; }
      .card { padding: 1.1rem; }
      h1.hero { font-size: 1.1rem; }
      .rb-value { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="card" id="top" role="main">
    <header>
      <h1 class="hero">song bar to seconds</h1>
      <p class="lead">Enter BPM, bar range, and optional extra seconds. Default time signature: 4/4.</p>
    </header>

    <main>
      <form id="calcForm" autocomplete="off">
        <div class="row">
          <div class="field">
            <label for="bpm">BPM</label>
            <input type="number" id="bpm" name="bpm" placeholder="90" min="1" step="1" required />
          </div>
          <div class="field">
            <label for="timesig">Time signature</label>
            <select id="timesig" name="timesig">
              <option value="4/4" selected>4/4</option>
              <option value="3/4">3/4</option>
              <option value="6/8">6/8</option>
              <option value="5/4">5/4</option>
              <option value="7/8">7/8</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Bars</label>
          <div class="bars-range">
            <div class="bars-col">
              <input type="number" id="bars" name="bars" placeholder="from" min="1" step="1" required />
            </div>
            <div class="bars-divider">—</div>
            <div class="bars-col">
              <input type="number" id="tobars" name="tobars" placeholder="to" min="1" step="1" required />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="plussecs">Additional seconds (+sec)</label>
          <input type="number" id="plussecs" name="plussecs" placeholder="0" min="0" step="0.1" value="0" />
        </div>

        <div class="actions">
          <button type="submit">Calculate</button>
          <button type="button" class="btn-share" id="shareBtn">Share ↗</button>
        </div>
      </form>

      <div id="result" class="result" aria-live="polite">
        <div class="result-beat-row">
          1 beat = <span id="beatsecs">—</span> s &nbsp;·&nbsp; 1 bar = <span id="barsecs">—</span> s &nbsp;·&nbsp; <span id="rangeSummary"></span>
        </div>

        <div class="result-block">
          <div class="rb-title">One bar in seconds</div>
          <div class="rb-value" id="r-onebar">—<span class="unit">s</span></div>
        </div>

        <div class="result-block">
          <div class="rb-title">Timeline position</div>
          <div class="rb-value accent" id="r-start">Start: XX s</div>
          <div class="rb-value coral" id="r-end">End: XX s</div>
          <div class="rb-sub" id="r-duration"></div>
        </div>

        <div class="result-block">
          <div class="rb-title" id="r-range-title">bars in seconds</div>
          <div class="rb-value accent" id="r-range">—<span class="unit">s</span></div>
          <div class="rb-sub" id="r-range-sub"></div>
        </div>

        <div class="result-block" id="r-plus-block">
          <div class="rb-title" id="r-plus-title">bars in seconds (+sec)</div>
          <div class="rb-value coral" id="r-plus">—<span class="unit">s</span></div>
          <div class="rb-sub" id="r-plus-sub"></div>
        </div>
      </div>
    </main>

    <footer>
      <div>&copy; <span id="yr"></span> <a href="https://github.com/arvdevable">blasius nafiri marvin</a></div>
      <div>open source · MIT</div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const $ = (s) => document.querySelector(s);

    const form        = $('#calcForm');
    const bpmEl       = $('#bpm');
    const barsEl      = $('#bars');
    const tobEl       = $('#tobars');
    const plusEl      = $('#plussecs');
    const tsEl        = $('#timesig');
    const resultBox   = $('#result');
    const beatSecsEl  = $('#beatsecs');
    const barSecsEl   = $('#barsecs');
    const rangeSumEl  = $('#rangeSummary');
    const rOnebar     = $('#r-onebar');
    const rRangeTitle = $('#r-range-title');
    const rStart      = $('#r-start');
    const rEnd        = $('#r-end');
    const rDuration   = $('#r-duration');
    const rRange      = $('#r-range');
    const rRangeSub   = $('#r-range-sub');
    const rPlusBlock  = $('#r-plus-block');
    const rPlusTitle  = $('#r-plus-title');
    const rPlus       = $('#r-plus');
    const rPlusSub    = $('#r-plus-sub');
    const shareBtn    = $('#shareBtn');
    const toast       = $('#toast');

    $('#yr').textContent = new Date().getFullYear();

    let toastTimer;
    function showToast(msg, ms = 1600) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function parseTimesig(ts) {
      const [num] = ts.split('/').map(Number);
      return num || 4;
    }

    function fmt(n) {
      let s = (Math.round(n * 100) / 100).toFixed(2);
      return s.replace(/(\.\d)0$/, '$1');
    }

    // set text of a .rb-value without destroying the inner <span class="unit">
    function setVal(el, text) {
      const unit = el.querySelector('.unit');
      el.textContent = text;
      if (unit) el.appendChild(unit);
    }

    function calcAndRender(prefill) {
      const bpm      = Number(prefill?.bpm      ?? bpmEl.value);
      const barsFrom = Math.max(1, parseInt(prefill?.bars   ?? barsEl.value, 10) || 1);
      const barsToR  = Math.max(1, parseInt(prefill?.tobars ?? tobEl.value,  10) || barsFrom);
      const barsTo   = Math.max(barsFrom, barsToR);
      const plussecs = Math.max(0, Number(prefill?.plussecs ?? plusEl.value) || 0);
      const timesig  = prefill?.timesig ?? tsEl.value;

      if (!bpm || bpm <= 0) { showToast('Enter a valid BPM first.'); return; }

      const beatsPerBar = parseTimesig(timesig);
      const oneBeatSecs = 60 / bpm;
      const oneBarSecs  = oneBeatSecs * beatsPerBar;

      // meta
      beatSecsEl.textContent = fmt(oneBeatSecs);
      barSecsEl.textContent  = fmt(oneBarSecs);
      rangeSumEl.textContent = `${timesig} · ${beatsPerBar} beats/bar`;

      // Block 1: one bar
      setVal(rOnebar, fmt(oneBarSecs));

      // Block 2: timeline position
      const totalBars  = barsTo - barsFrom + 1;
      const rangeSecs  = oneBarSecs * totalBars;

      const startSeconds = (barsFrom - 1) * oneBarSecs;
      const endSeconds   = barsTo * oneBarSecs;

      setVal(rStart, `Start: ${fmt(startSeconds)}`);
      setVal(rEnd,   `End: ${fmt(endSeconds)}`);
      rDuration.textContent = `Duration: ${fmt(rangeSecs)} s`;

      // Block 3 & 4: range
      const totalBeats = beatsPerBar * totalBars;
      const rangeWithPlus = rangeSecs + plussecs;

      const rangeLabel = barsFrom === barsTo
        ? `bar ${barsFrom}`
        : `bars ${barsFrom}–${barsTo}`;

      rRangeTitle.textContent = `${rangeLabel} in seconds`;
      setVal(rRange, fmt(rangeSecs));
      rRangeSub.textContent   = `${totalBars} bar${totalBars > 1 ? 's' : ''} · ${totalBeats} beats`;

      rPlusTitle.textContent  = `${rangeLabel} in seconds (+sec)`;
      setVal(rPlus, fmt(rangeWithPlus));
      rPlusSub.textContent    = plussecs > 0
        ? `${fmt(rangeSecs)} s + ${fmt(plussecs)} s`
        : `no extra seconds added`;
      rPlusBlock.style.opacity = plussecs > 0 ? '1' : '0.45';

      resultBox.style.display = 'flex';
      document.getElementById('top').scrollIntoView({ behavior: 'smooth', block: 'start' });

      const params = new URLSearchParams({ bpm, bars: barsFrom, tobars: barsTo, plussecs, timesig });
      history.replaceState({}, '', `${location.pathname}?${params}`);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const from = parseInt(barsEl.value, 10) || 1;
      const to   = parseInt(tobEl.value,  10) || from;
      if (to < from) tobEl.value = from;
      calcAndRender();
    });

    shareBtn.addEventListener('click', () => {
      const url = location.href;
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url)
          .then(() => showToast('Link copied!'))
          .catch(() => showToast('Copy failed — grab the URL manually'));
      } else {
        const tmp = Object.assign(document.createElement('input'), { value: url });
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        tmp.remove();
        showToast('Link copied!');
      }
    });

    function loadFromUrl() {
      const p = Object.fromEntries(new URLSearchParams(location.search));
      if (!Object.keys(p).length) return;
      if (p.bpm)      bpmEl.value  = p.bpm;
      if (p.bars)     barsEl.value = p.bars;
      if (p.tobars)   tobEl.value  = p.tobars;
      if (p.plussecs) plusEl.value = p.plussecs;
      if (p.timesig)  tsEl.value   = p.timesig;
      if (p.bpm) calcAndRender(p);
    }

    window.addEventListener('load', () => {
      if (!bpmEl.value)  bpmEl.value  = 90;
      if (!barsEl.value) barsEl.value = 1;
      if (!tobEl.value)  tobEl.value  = 12;
      if (!plusEl.value) plusEl.value = 0;
      loadFromUrl();
    });
  </script>
</body>
</html>
